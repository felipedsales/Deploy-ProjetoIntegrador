services:
  - type: web
    name: ferraz-conecta
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: APP_URL
        value: https://ferraz-conecta.onrender.com
      - key: APP_DEBUG
        value: false
      - key: APP_KEY # Adicionado para segurança
        generateValue: true
      - key: DB_TYPE
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ferraz-conecta-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ferraz-conecta-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ferraz-conecta-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ferraz-conecta-db
          property: user # Corrigido de 'username' para 'user'
      - key: DB_PASSWORD
        fromDatabase:
          name: ferraz-conecta-db
          property: password

databases:
  - name: ferraz-conecta-db
    databaseName: ferraz_conecta
    user: ferraz_conecta_user
    plan: free # Atualizado para o plano gratuito atual
